# SLF4J Simple Logger configuration
# See https://www.slf4j.org/api/org/slf4j/simple/SimpleLogger.html
# Default log level for all loggers (trace, debug, info, warn, error, off)
org.slf4j.simpleLogger.defaultLogLevel=warn
# Disable CPG library logging (on/warn/off)
org.slf4j.simpleLogger.log.de.fraunhofer.aisec.cpg=warn
